groups:
  - name: aegis_flow_alerts
    rules:
      - alert: HighRequestLatency
        expr: histogram_quantile(0.99, rate(aegis_request_duration_seconds_bucket[5m])) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: High request latency on Aegis-Flow
          description: "The 99th percentile of request latency is above 500ms for more than 2 minutes."

      - alert: HighErrorRate
        expr: rate(aegis_errors_total[5m]) / rate(aegis_requests_total[5m]) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: High error rate detected
          description: "More than 5% of requests are resulting in errors."

      - alert: PQCHandshakeFailures
        expr: rate(aegis_handshakes_total{success="false"}[5m]) > 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: PQC handshake failures detected
          description: "Multiple Post-Quantum Cryptography handshakes are failing, check potential protocol downgrades or attack vectors."

      - alert: CarbonIntensitySpike
        expr: aegis_carbon_intensity > 300
        for: 15m
        labels:
          severity: info
        annotations:
          summary: High grid carbon intensity detected
          description: "Carbon intensity is above 300 gCO2/kWh in the current region. Consider routing traffic to greener regions if possible."
