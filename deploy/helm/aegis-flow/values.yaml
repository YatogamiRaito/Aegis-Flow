# Default values for aegis-flow
# This is a YAML-formatted file.

# Image configuration
image:
  repository: ghcr.io/aegis-flow/aegis-flow
  tag: "0.31.0"
  pullPolicy: IfNotPresent

# Number of replicas
replicaCount: 2

# Service configuration
service:
  type: ClusterIP
  port: 8443
  metricsPort: 8081

# Resource limits
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 64Mi

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
  # customMetrics:
  #   - type: Pods
  #     pods:
  #       metric:
  #         name: aegis_pqc_handshakes_total
  #       target:
  #         type: AverageValue
  #         averageValue: 50

# Pod configuration
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8081"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Configuration
config:
  pqcEnabled: true
  algorithm: HybridMlKem768
  logLevel: info
  logFormat: json
  upstreamAddr: "localhost:9000"

# TLS configuration
tls:
  enabled: false
  secretName: aegis-flow-tls

# Service account
serviceAccount:
  create: true
  name: aegis-flow
  annotations: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: aegis-flow
          topologyKey: kubernetes.io/hostname

# Probes
livenessProbe:
  httpGet:
    path: /health
    port: metrics
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /ready
    port: metrics
  initialDelaySeconds: 5
  periodSeconds: 5

# Pod Disruption Budget (production stability)
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Network Policy (security hardening)
networkPolicy:
  enabled: false  # Enable in production

# Prometheus ServiceMonitor
serviceMonitor:
  enabled: false  # Enable when Prometheus Operator is installed
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

# Seccomp profile (kernel-level security)
seccompProfile:
  type: RuntimeDefault

# Environment-specific profiles
profiles:
  # Development
  dev:
    replicaCount: 1
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
    autoscaling:
      enabled: false

  # Production
  production:
    replicaCount: 3
    resources:
      limits:
        cpu: 1000m
        memory: 512Mi
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 20
    podDisruptionBudget:
      enabled: true
      minAvailable: 2
    networkPolicy:
      enabled: true
