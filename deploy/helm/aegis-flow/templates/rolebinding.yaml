apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "aegis-flow.fullname" . }}-rolebinding
  labels:
    {{- include "aegis-flow.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "aegis-flow.fullname" . }}-role
subjects:
  - kind: ServiceAccount
    name: {{ include "aegis-flow.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
