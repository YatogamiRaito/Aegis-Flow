# cargo-nextest configuration
# https://nexte.st/book/configuration.html

[store]
dir = "target/nextest"

# CI profile for JUnit XML output (used by Codecov Test Analytics)
[profile.ci]
# Output JUnit XML for Codecov
junit.path = "junit.xml"
junit.report-name = "aegis-flow-tests"
junit.store-success-output = true
junit.store-failure-output = true

# Faster than default for CI
retries = 0
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 2 }

# Default profile for local development
[profile.default]
retries = 0
fail-fast = true
